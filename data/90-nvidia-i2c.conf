# Xorg configuration to enable I2C/DDC access on NVIDIA proprietary driver
#
# The NVIDIA proprietary driver may fail to expose /dev/i2c-* devices for
# DDC/CI communication with monitors over DisplayPort or HDMI.  Setting the
# registry keys below forces the driver to use software I2C, which makes
# DDC/CI work correctly with ddccontrol and other DDC tools.
#
# To apply this configuration, copy this file to /etc/X11/xorg.conf.d/:
#
#   sudo cp 90-nvidia-i2c.conf /etc/X11/xorg.conf.d/
#
# Then restart your X session or reboot.
#
# References:
#   https://forums.developer.nvidia.com/t/gddccontrol-issues-with-nvidia-drivers-i2c-monitor-display-ddc-dp-hdmi-failing/30427
#   https://forums.developer.nvidia.com/t/solved-does-gddccontrol-work-for-anyone-here-nvidia-i2c-monitor-display-ddc/36850

Section "Device"
    Driver     "nvidia"
    Identifier "Dev0"
    Option     "RegistryDwords" "RMUseSwI2c=0x01; RMI2cSpeed=100"
EndSection
